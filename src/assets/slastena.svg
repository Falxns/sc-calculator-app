<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" fill="none">
  <defs>
    <linearGradient id="topFace" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1565c0"/>
      <stop offset="60%" stop-color="#29b6f6"/>
      <stop offset="100%" stop-color="#4fc3f7"/>
    </linearGradient>
    <linearGradient id="rightFace" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d47a1"/>
      <stop offset="100%" stop-color="#1976d2"/>
    </linearGradient>
    <linearGradient id="leftFace" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0d47a1"/>
      <stop offset="100%" stop-color="#1565c0"/>
    </linearGradient>
    <linearGradient id="edgeGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#81d4fa"/>
      <stop offset="100%" stop-color="#0288d1"/>
    </linearGradient>
    <filter id="outerGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="blur"/>
      <feFlood flood-color="#29b6f6" flood-opacity="0.35" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="sharpGlow">
      <feGaussianBlur stdDeviation="0.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <g filter="url(#outerGlow)">
    <!-- Isometric cube: top face (y=1), right face (x=1), left face (z=1). Drawn back-to-front so overlap is correct. -->
    <!-- Left face (recedes left) -->
    <path d="M12 42 L12 22 L32 32 L32 52 Z" fill="url(#leftFace)"/>
    <!-- Right face (recedes right) -->
    <path d="M52 42 L52 22 L32 32 L32 52 Z" fill="url(#rightFace)"/>
    <!-- Top face -->
    <path d="M32 12 L52 22 L32 32 L12 22 Z" fill="url(#topFace)"/>
    <!-- Edges (stroke once so all 9 cube edges) -->
    <path d="M12 42 L12 22 L32 32 L12 42 L32 52 L32 32 L52 22 L52 42 L32 52 M32 12 L12 22 M32 12 L52 22 M32 12 L32 32" stroke="url(#edgeGlow)" stroke-width="1.2" fill="none" filter="url(#sharpGlow)"/>
  </g>
</svg>